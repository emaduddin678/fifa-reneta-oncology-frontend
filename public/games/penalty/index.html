// ── Sprite loader ─────────────────────────────────────────────
function loadSprite(src, removeBg, cb) {
  var img = new Image();
  function onDone() {
    if (!removeBg) { cb(img); return; }
    try {
      var oc=document.createElement('canvas');
      oc.width=img.width||2; oc.height=img.height||2;
      var octx=oc.getContext('2d');
      octx.drawImage(img,0,0);
      var id=octx.getImageData(0,0,oc.width,oc.height),d=id.data;
      for(var i=0;i<d.length;i+=4){
  var r=d[i],g=d[i+1],b=d[i+2];
  var mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  var sat=mx>0?(mx-mn)/mx:0;
  // Pure black bg: remove
  if(mx<22){d[i+3]=0;}
  // Dark desaturated JPEG halo: remove/fade
  else if(mx<60&&sat<0.28){d[i+3]=Math.floor((sat/0.28)*(mx/60)*255);}
  // Slightly colored but still dark edge: fade
  else if(mx<40&&sat<0.45){d[i+3]=Math.floor((sat/0.45)*255);}
}
      octx.putImageData(id,0,0);
      cb(oc);
    } catch(err) { cb(null); }
  }
  img.onload  = onDone;
  img.onerror = function(){ cb(null); };  // failed load still counts
  img.src = src;
}

  function removeDarkBg(img){
    var oc=document.createElement('canvas');
    oc.width=img.width; oc.height=img.height;
    var octx=oc.getContext('2d');
    octx.drawImage(img,0,0);
    var id=octx.getImageData(0,0,oc.width,oc.height),d=id.data;
    for(var i=0;i<d.length;i+=4){
      var r=d[i],g=d[i+1],b=d[i+2];
      var mx=Math.max(r,g,b),mn=Math.min(r,g,b);
      var sat=mx>0?(mx-mn)/mx:0;
      // Remove dark near-black pixels (background)
      if(mx<18){d[i+3]=0;}
      else if(mx<55&&sat<0.22){d[i+3]=Math.floor((mx-18)/37*255);}
    }
    octx.putImageData(id,0,0);
    return oc;
  }
  // These 3 logos already have clean white backgrounds — skip removal
  var whiteOK={fcap:1,fgem:1,frpag:1,fren:1,ftax:1,fren2:1,ftyro:1};
  for(var k in srcs){(function(key,src){
    var img=new Image();
    img.onload=function(){
      FLAG_IMGS[key] = whiteOK[key] ? img : removeDarkBg(img);
    };
    img.onerror=function(){};
    img.src=src;
  })(k,srcs[k]);}
})();

// ── Waving flags over crowd ───────────────────────────────────
function drawWavingFlag(img, vx, vy, vw, vh, phase, speed) {
  if(!img) return;
  var t = frame * speed + phase;
  // Wave: slight up-down bob + horizontal scale shimmer
  var bobY  = Math.sin(t) * ps(2.5);
  var skewX = Math.sin(t * 0.8) * 0.04;  // horizontal cloth wave
  CX.save();
  CX.translate(px(vx), py(vy) + bobY);
  CX.transform(1, skewX, 0, 1, 0, 0);    // cloth distortion
  CX.drawImage(img, 0, 0, ps(vw), ps(vh));
  CX.restore();
}

function drawWavingFlags() {
  if(!CROWD_IMG) return; // only draw over real crowd photo

  // ── Sponsor banners along the crowd bottom row ────────────────
  // Renata PLC sponsor banners
  // Gallery: 6 banners rotate through 8 images every 5 seconds
  var gallery=['f37','fcap','fgem','fren','frpag'];
  var gSlot = Math.floor(frame/300) % gallery.length;
  var slots=[
    {x:6,   y:138, w:86, h:26, ph:0.0,  sp:0.038},
    {x:100, y:142, w:86, h:26, ph:1.2,  sp:0.032},
    {x:194, y:138, w:86, h:26, ph:0.6,  sp:0.040},
    {x:287, y:142, w:86, h:26, ph:1.8,  sp:0.035},
    {x:380, y:138, w:86, h:26, ph:0.9,  sp:0.037}
  ];
  for(var si=0;si<slots.length;si++){
    var sl=slots[si];
    var imgKey=gallery[(gSlot+si)%gallery.length];
    drawWavingFlag(FLAG_IMGS[imgKey],sl.x,sl.y,sl.w,sl.h,sl.ph,sl.sp);
  }

  // ── GOAL!! flags: pop up and wave when goal scored ────────────
  if(joyLevel > 0.15) {
    var gAlpha = Math.min((joyLevel - 0.15) / 0.3, 1);
    CX.save();
    CX.globalAlpha = gAlpha;
    // Left crowd: blue GOAL flag
    drawWavingFlag(FLAG_IMGS.f86, 4,   113, 70, 58, 0.0, 0.12);
    // Right crowd: Taxopac sponsor flag
    drawWavingFlag(FLAG_IMGS.ftax, 384, 90, 70, 35, 0.5, 0.10);
    // Extra flags higher up when very joyful
    if(joyLevel > 0.6) {
      CX.globalAlpha = 1;  // full opacity for these two
      drawWavingFlag(FLAG_IMGS.fren2, 62,  98, 64, 27, 1.0, 0.14);
      drawWavingFlag(FLAG_IMGS.ftyro, 312, 102, 64, 27, 1.5, 0.11);
    }
    CX.restore();
  }
}

// ── Stadium ───────────────────────────────────────────────────
function drawBanner(bx,by,col,txtCol,txt){
  var w=ps(70),h=ps(22);
  var wave=Math.sin(frame*0.03+(bx/VW)*3)*ps(3);
  CX.save();CX.translate(px(bx),py(by)+wave);
  CX.fillStyle=col;
  CX.beginPath();CX.moveTo(0,0);CX.lineTo(w,0);CX.lineTo(w-ps(9),h);CX.lineTo(-ps(7),h);CX.closePath();CX.fill();

// ── GK position calculator ────────────────────────────────────
function gkCalcPos(){
  var kx=GK.x,ky=GK.y,lean=0,jumpUp=0;
  if(GK.diving){
    var e=easeOut(Math.min(GK.t,1));
    if(GK.dir===0){jumpUp=e*GK.jumpY;}
    else{kx+=GK.dir*e*GK.diveX;jumpUp=e*GK.heightRatio*GK_CORN_Y;lean=GK.dir*e*0.75;}
    ky-=jumpUp;
  } else {kx+=Math.sin(GK.idle*0.033)*16;}
  return{kx:kx,ky:ky,lean:lean,jumpUp:jumpUp};
}

// ── Draw Goalkeeper ───────────────────────────────────────────
function drawKeeper(){
  var pos=gkCalcPos(),kx=pos.kx,ky=pos.ky;
  if(!GK.diving)GK.idle++;
  var sprIdx;
  if(GK.diving&&GK.dir<0)sprIdx=1;
  else if(GK.diving&&GK.dir>0)sprIdx=2;
  else if(GK.diving&&GK.dir===0)sprIdx=3;
  else sprIdx=0;

  // Ground shadow
  CX.save();CX.fillStyle='rgba(0,0,0,0.18)';
  var shadowSc=(GK.diving&&GK.dir===0)?Math.max(0.45,1-pos.jumpUp/80):1;
  CX.beginPath();CX.ellipse(px(kx),py(GK.y)+ps(18),ps(34*shadowSc),ps(7*shadowSc),0,0,6.28);CX.fill();CX.restore();

  if(GK_SPRITES_READY<4||!GK_SPRITES[sprIdx]){drawKeeperFallback(pos);return;}

  var spr=GK_SPRITES[sprIdx],dims=GK_SPRITE_DIMS[sprIdx],natW=dims[0],natH=dims[1];
  CX.save();CX.translate(px(kx),py(ky));
  var scH,scW;
  if(sprIdx===0){
    scH=ps(152);scW=scH*(natW/natH);
    CX.translate(Math.sin(GK.idle*0.033)*ps(6),0);
    CX.drawImage(spr,-scW/2,-scH+ps(20),scW,scH);
  } else if(sprIdx===3){
    scH=ps(165);scW=scH*(natW/natH);
    CX.drawImage(spr,-scW/2,-scH+ps(20),scW,scH);
  } else {
    scW=ps(200);scH=scW*(natH/natW);
    if(sprIdx===1)CX.drawImage(spr,-scW*0.72,-scH*0.85,scW,scH);
    else CX.drawImage(spr,-scW*0.28,-scH*0.85,scW,scH);
  }
  CX.restore();
}

// ── Aim preview ───────────────────────────────────────────────
function computeBezierPt(ax,ay,bx,by,cx,cy,t){var mt=1-t;return{x:mt*mt*ax+2*mt*t*bx+t*t*cx,y:mt*mt*ay+2*mt*t*by+t*t*cy};}
function computeShot(dx,dy,pow){
  var tx=clamp(BX0+dx*1.82,GL-22,GR+22),ty=clamp(BY0+dy*1.82,GT-26,GB+16);
  var shotDX=tx-BX0,shotDY=ty-BY0,shotLen=Math.sqrt(shotDX*shotDX+shotDY*shotDY)||1;
  var perpX=-shotDY/shotLen,perpY=shotDX/shotLen;
  var rawSwerve=dx*0.95;
  if(rawSwerve>=0&&rawSwerve<32)rawSwerve=32;
  if(rawSwerve<0&&rawSwerve>-32)rawSwerve=-32;
  var cpx=BX0+shotDX*0.35+perpX*rawSwerve;
  var cpy=BY0+shotDY*0.35+perpY*rawSwerve;
  return{p1x:cpx,p1y:cpy,p2x:tx,p2y:ty};
}

function drawAim(){
  if(st!==ST.AIM||!DR.on)return;
  var dx=DR.x-DR.x0,dy=DR.y-DR.y0,len=Math.sqrt(dx*dx+dy*dy);
  if(len<8)return;
  var pow=Math.min(len/155,1),shot=computeShot(dx,dy,pow);
  CX.save();
  CX.setLineDash([ps(9),ps(7)]);CX.lineDashOffset=-frame*0.9;
  CX.strokeStyle='rgba(255,238,50,'+(0.48+pow*0.44)+')';CX.lineWidth=ps(2.8);
  CX.shadowColor='rgba(255,230,50,0.55)';CX.shadowBlur=ps(10);

  CX.setLineDash([]);CX.shadowBlur=0;
  var pt4=computeBezierPt(BX0,BY0,shot.p1x,shot.p1y,shot.p2x,shot.p2y,0.4);
  CX.globalAlpha=0.22*pow;CX.fillStyle='#fff';CX.beginPath();CX.arc(px(pt4.x),py(pt4.y),ps(ball.r*0.65),0,6.28);CX.fill();CX.globalAlpha=1;
  var ta=0.38+pow*0.52,rr2=ps(13+pow*10);
  CX.fillStyle='rgba(255,65,65,'+(ta*0.32)+')';CX.strokeStyle='rgba(255,65,65,'+ta+')';CX.lineWidth=ps(2.2);
  CX.beginPath();CX.arc(px(shot.p2x),py(shot.p2y),rr2,0,6.28);CX.fill();CX.stroke();
  CX.beginPath();CX.moveTo(px(shot.p2x)-ps(10),py(shot.p2y));CX.lineTo(px(shot.p2x)+ps(10),py(shot.p2y));CX.moveTo(px(shot.p2x),py(shot.p2y)-ps(10));CX.lineTo(px(shot.p2x),py(shot.p2y)+ps(10));CX.stroke();
  var bw=ps(145),bh=ps(12),bx2=px(VW/2-72.5),by2=py(VH-86);
  rrect(bx2,by2,bw,bh,ps(6),'rgba(0,0,0,0.52)');
  var pc=pow<0.38?'#4ade80':pow<0.7?'#fbbf24':'#f87171';
  rrect(bx2,by2,bw*pow,bh,ps(6),pc);
  CX.strokeStyle='rgba(255,255,255,0.3)';CX.lineWidth=ps(1);rrect(bx2,by2,bw,bh,ps(6),null,'rgba(255,255,255,0.3)');
  CX.fillStyle='rgba(255,255,255,0.85)';CX.font='bold '+ps(10)+'px Segoe UI,Arial,sans-serif';CX.textAlign='center';CX.textBaseline='alphabetic';
  CX.fillText('POWER',px(VW/2),by2-ps(5));
  CX.restore();
}

// ── Game Logic ────────────────────────────────────────────────
function doShoot(){
  if(st!==ST.AIM)return;
  var dx=DR.x-DR.x0,dy=DR.y-DR.y0,len=Math.sqrt(dx*dx+dy*dy);
  if(len<10){cancelDrag();return;}
  var pow=Math.min(len/155,1),spd=0.017+pow*0.022,shot=computeShot(dx,dy,pow);
  FLY.p0x=BX0;FLY.p0y=BY0;FLY.p1x=shot.p1x;FLY.p1y=shot.p1y;FLY.p2x=shot.p2x;FLY.p2y=shot.p2y;
  FLY.t=0;FLY.spd=spd;FLY.on=true;FLY.done=false;
  ball.spinDir=dx>0?0.08:-0.08;
  keeperDecide(shot.p2x,shot.p2y);
  st=ST.FLY;sndKick();cancelDrag();
}
function cancelDrag(){DR.on=false;}
function keeperDecide(tx,ty){
  // Tight center zone: only jump for truly centered shots
  // GCX±GW*0.10 = 240±26 → [214,266], everything else dives left/right
  var zone=0;
  if(tx<GCX-GW*0.08)       zone=-1;  // left side  → dive left
  else if(tx>GCX+GW*0.08)  zone=1;   // right side → dive right
  // else zone=0 → center jump (only for tx in [214,266])
  GK.heightRatio=clamp(1-(ty-GT)/GH,0,1);
  // 32% wrong guess — 68% correct direction
  if(Math.random()<0.32){
    var opts=[];
    var all=[-1,0,1];
    for(var i=0;i<3;i++){
      if(all[i]===zone) continue;
      // Avoid wrong-guess of jump for clearly left/right shots
      if(all[i]===0 && Math.abs(tx-GCX)>GW*0.25) continue;
      opts.push(all[i]);
    }
    if(opts.length>0) GK.dir=opts[Math.floor(Math.random()*opts.length)];
    else GK.dir=zone;
  } else {
    GK.dir=zone;
  }
  // Random dive distance: short / medium / full
  var roll=Math.random();
  if(roll<0.25)      GK.diveX=40+Math.random()*25;   // short  25% → 40-65
  else if(roll<0.55) GK.diveX=65+Math.random()*20;   // medium 30% → 65-85
  else               GK.diveX=85+Math.random()*12;   // full   45% → 85-97
  // Random jump height: small / medium / full
  var roll2=Math.random();
  if(roll2<0.25)      GK.jumpY=2+Math.random()*6;    // small  25% → 2-8
  else if(roll2<0.55) GK.jumpY=27+Math.random()*14;  // medium 30% → 27-41
  else                GK.jumpY=41+Math.random()*10;  // full   45% → 41-51
  // Low ball override: if ball is in lower 40% of goal, keeper stays low
  if(zone===0 && ty > GT + GH*0.60){
    GK.jumpY = Math.random()*6;  // barely lifts off for low center shots
  }
  GK.diving=true;GK.t=0;GK.saved=false;
}
// ── Pixel-perfect keeper collision ────────────────────────────
function pixelHitTest(sprIdx2, kx, ky, bx, by) {
  var spr = GK_SPRITES[sprIdx2];
  if (!spr) {
    return Math.abs(bx-kx)<40 && by>(ky-132) && by<(ky+22);
  }
  var dims=GK_SPRITE_DIMS[sprIdx2],natW=dims[0],natH=dims[1];
  var scW_v,scH_v,sprL,sprT;
  if(sprIdx2===0){
    scH_v=152; scW_v=scH_v*(natW/natH);
    sprL=kx-scW_v/2; sprT=ky-scH_v+20;
  } else if(sprIdx2===3){
    scH_v=165; scW_v=scH_v*(natW/natH);
    sprL=kx-scW_v/2; sprT=ky-scH_v+20;
  } else if(sprIdx2===1){
    scW_v=200; scH_v=scW_v*(natH/natW);
    sprL=kx-scW_v*0.72; sprT=ky-scH_v*0.85;
  } else if(sprIdx2===3){
    // Jump sprite is narrow — use wider virtual box to cover full arm span
    scH_v=165; scW_v=90;
    sprL=kx-scW_v/2; sprT=ky-scH_v+20;
  } else {
    scW_v=200; scH_v=scW_v*(natH/natW);
    sprL=kx-scW_v*0.28; sprT=ky-scH_v*0.85;
  }
  var bxS=((bx-sprL)/scW_v)*spr.width;
  var byS=((by-sprT)/scH_v)*spr.height;
  var rS=Math.max(2, (8/scW_v)*spr.width);
  var x1=Math.max(0,Math.floor(bxS-rS));
  var y1=Math.max(0,Math.floor(byS-rS));
  var x2=Math.min(spr.width-1,Math.ceil(bxS+rS));
  var y2=Math.min(spr.height-1,Math.ceil(byS+rS));
  if(x2<=x1||y2<=y1) return false;
  try {
    var id=spr.getContext('2d').getImageData(x1,y1,x2-x1,y2-y1);
    var d=id.data;
    for(var pi=3;pi<d.length;pi+=4){ if(d[pi]>80) return true; }
  } catch(err) {
    // getImageData blocked — tight fallback bounding box
    var dx2=bx-kx, dy2=by-ky;
    if(sprIdx2===0) return dx2>-40&&dx2<40&&dy2>-128&&dy2<18;
    if(sprIdx2===1) return dx2>-130&&dx2<62&&dy2>-138&&dy2<8;
    if(sprIdx2===2) return dx2>-62&&dx2<130&&dy2>-138&&dy2<8;
    if(sprIdx2===3) return dx2>-25&&dx2<25&&dy2>-145&&dy2<18;
  }
  return false;
}

function resolveShot(){
  nShots++;
  var bx=FLY.p2x,by=FLY.p2y;
  var inGoal=bx>GL+4&&bx<GR-4&&by<GB+18&&by>GT-24;
  var e=easeOut(Math.min(GK.t,1)),kx=GK.x,kFinalY=GK.y;
  if(GK.dir===0)kFinalY-=e*GK.jumpY;
  else{kx+=GK.dir*e*GK.diveX;kFinalY-=e*GK.heightRatio*GK_CORN_Y;}
  // ── Hitbox matched to each sprite pose ───────────────────────
  // Standing/Jump: sprite is 152 tall drawn at -scH+20 → top = kFinalY-132
  // Dive:          sprite is ~150 tall drawn at -scH*0.85 → top = kFinalY-127
  var sprIdx2;
  if(GK.diving&&GK.dir<0)sprIdx2=1;
  else if(GK.diving&&GK.dir>0)sprIdx2=2;
  else if(GK.diving&&GK.dir===0)sprIdx2=3;
  else sprIdx2=0;
  var hitGK=pixelHitTest(sprIdx2,kx,kFinalY,bx,by);
  // Secondary box: always run as fallback when pixel test fails
  // Tight dimensions prevent false saves — only real overlaps register
  if(!hitGK){
    var dx3=bx-kx, dy3=by-kFinalY;
    if(sprIdx2===0) hitGK=dx3>-44&&dx3<44&&dy3>-132&&dy3<20;
    if(sprIdx2===1) hitGK=dx3>-135&&dx3<62&&dy3>-125&&dy3<8;
    if(sprIdx2===2) hitGK=dx3>-62&&dx3<135&&dy3>-125&&dy3<8;
    if(sprIdx2===3) hitGK=dx3>-45&&dx3<45&&dy3>-145&&dy3<22;
  }
  if(hitGK&&inGoal){resultMsg='SAVED!';resultColor='#f87171';nSaves++;GK.saved=true;sndSave();}
  else if(inGoal){resultMsg='GOAL!';resultColor='#4ade80';nGoals++;netShake=18;joyLevel=1;camShake=7;spawnConfetti(bx,by,80);sndGoal();playGoalCelebration();}
  else{resultMsg='MISS!';resultColor='#fbbf24';nMiss++;sndMiss();}
  resultT=110;st=ST.RESULT;
}
function resetRound(){
  ball.x=BX0;ball.y=BY0;ball.spin=0;ball.spinDir=0.06;
  FLY.on=false;FLY.done=false;FLY.t=0;
  GK.x=GCX;GK.y=GB+22;GK.diving=false;GK.t=0;GK.dir=0;GK.saved=false;GK.heightRatio=0;GK.diveX=95;GK.jumpY=42;
}
function startGame(){
  nShots=0;nGoals=0;nSaves=0;nMiss=0;
  particles=[];joyLevel=0;camShake=0;
  resetRound();st=ST.IDLE;sndClick();
  positionNameInput();
  // Crowd cheer when game begins
  playCrowdCheer();
}

// ── Input ─────────────────────────────────────────────────────
function getVP(e){var r=CV.getBoundingClientRect();var src=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);return toV(src.clientX-r.left,src.clientY-r.top);}

function onDown(e){
  e.preventDefault();
  try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}catch(ex){}
  startBGMusic();
  var p=getVP(e);

  if(st===ST.SPLASH){
    // Sound toggle
    if(p.x>VW-52&&p.y>10&&p.y<44){setAudioMute(!muted);sndClick();return;}
    // Validate and start
    var name=NI?NI.value.trim():'';
    if(name.length===0){nameError='Please enter your name!';return;}
    if(isDuplicate(name)){nameError='Name already on leaderboard! Try another.';return;}
    if(name.length<2){nameError='Name must be at least 2 characters.';return;}
    playerName=name;nameError='';
    startGame();return;
  }
  if(st===ST.OVER){
    // Play Again button (left panel)
    if(p.x>24&&p.x<222&&p.y>VH-88&&p.y<VH-36){
      playerName='';nameError='';if(NI)NI.value='';
      st=ST.SPLASH;positionNameInput();sndClick();
    }
    return;
  }
  if(st===ST.RESULT)return;
  // Sound toggle
  if(p.x>VW-52&&p.y>10&&p.y<44){setAudioMute(!muted);sndClick();return;}
  if(st===ST.IDLE){
    var ddx=p.x-BX0,ddy=p.y-BY0;
    if(Math.sqrt(ddx*ddx+ddy*ddy)<ball.r*3.8){DR.on=true;DR.x0=p.x;DR.y0=p.y;DR.x=p.x;DR.y=p.y;st=ST.AIM;}
  }
}
function onMove(e){e.preventDefault();if(st!==ST.AIM||!DR.on)return;var p=getVP(e);DR.x=p.x;DR.y=p.y;}
function onUp(e){e.preventDefault();if(st===ST.AIM&&DR.on)doShoot();}

CV.addEventListener('mousedown', onDown,{passive:false});
CV.addEventListener('mousemove', onMove,{passive:false});
CV.addEventListener('mouseup',   onUp,  {passive:false});
CV.addEventListener('touchstart',onDown,{passive:false});
CV.addEventListener('touchmove', onMove,{passive:false});
CV.addEventListener('touchend',  onUp,  {passive:false});
document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

// ── Update ────────────────────────────────────────────────────
function update(){
  frame++;
  if(FLY.on&&st===ST.FLY){
    FLY.t=Math.min(FLY.t+FLY.spd,1);
    var pt=bezXY(FLY.t);ball.x=pt.x;ball.y=pt.y;ball.spin+=ball.spinDir;
    if(GK.diving&&GK.t<1)GK.t=Math.min(GK.t+0.038,1);
    if(FLY.t>=1&&!FLY.done){FLY.done=true;resolveShot();}
  }
  if(st===ST.RESULT){
    resultT--;
    if(resultT<=0){
      if(nShots>=TOTAL){
        saveLB(playerName,nGoals);
        try{window.parent.postMessage({type:"penaltyScore",goals:nGoals},"*");}catch(e){}
        st=ST.OVER;spawnConfetti(VW/2,VH*0.35,90);
      } else {resetRound();st=ST.IDLE;}
    }
  }
  var alive=[];for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=p.dec;p.rot+=p.rv;if(p.life>0)alive.push(p);}particles=alive;
  joyLevel=Math.max(0,joyLevel-0.0022);camShake=Math.max(0,camShake*0.88-0.04);
}

// ── Render ────────────────────────────────────────────────────
function render(){
  CX.clearRect(0,0,cw,ch);
  var sx=camShake>0?(Math.random()-.5)*camShake*SC:0,sy=camShake>0?(Math.random()-.5)*camShake*SC:0;
  CX.save();CX.translate(sx,sy);
  drawSky();drawClouds();drawStadium();drawGrass();drawGoal();drawKeeper();
  if(st!==ST.SPLASH&&st!==ST.OVER){
    var depth=FLY.on?(1-FLY.t*0.52):1,ballR=ball.r*(0.46+depth*0.54);
    drawBall(ball.x,ball.y,ballR,ball.spin,depth);drawAim();
  }
  drawParticles();
  if(st!==ST.SPLASH&&st!==ST.OVER)drawHUD();
  drawResult();
  if(st===ST.SPLASH)drawSplash();
  if(st===ST.OVER)drawGameOver();
  CX.restore();
}

// ── Load sprites then start loop ──────────────────────────────
var lastTS=0;
function loop(ts){requestAnimationFrame(loop);if(ts-lastTS<14)return;lastTS=ts;update();render();}

// Load all sprites
var toLoad=5;
function onSpriteLoad(){toLoad--;if(toLoad<=0)requestAnimationFrame(loop);}

(function(){
  var urlName=decodeURIComponent(new URLSearchParams(window.location.search).get('name')||'');
  if(!urlName)return;
  var dbScores=null;
  var _origGetLB=getLB;
  getLB=function(){return dbScores!==null?dbScores:_origGetLB();};
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='dbLeaderboard'){dbScores=e.data.scores;}
  });
  var _busy=false;
  setInterval(function(){
    if(typeof st!=='undefined'&&st===ST.SPLASH&&!_busy){
      _busy=true;
      playerName=urlName;
      if(NI)NI.value=urlName;
      nameError='';
      startGame();
      setTimeout(function(){_busy=false;},600);
    }
  },150);
})();
